<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE / TMB - Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --green:#00ff41;
  --green-mid:#00c032;
  --green-dim:#007a20;
  --green-dark:#002a0a;
  --amber:#ffb000;
  --red:#ff3333;
  --bg:#030803;
  --white:#d0ffd8;
}

*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  background:var(--bg);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  height:100%;
  overflow:hidden;
}

body::after {
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,255,65,.02) 3px,
    rgba(0,255,65,.02) 4px
  );
  pointer-events:none;
  z-index:9999;
}

@keyframes blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}

.page {
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
}

.page.active {
  display:flex;
}

#boot {
  justify-content:center;
  align-items:center;
  background:var(--bg);
}

#boot-inner {
  width:min(720px, 90vw);
  padding-bottom:96px;
}

.bl {
  font-size:13px;
  line-height:2;
  color:var(--green-dim);
  opacity:0;
  transition:opacity .1s;
  white-space:normal;
}

.bl.on { opacity:1; }
.bl.hi { color:var(--white); }
.bl.amb { color:var(--amber); }
.bl.red { color:var(--red); }

.boot-input-line {
  color:var(--white);
}

.boot-input-line::after {
  content:'█';
  animation:blink 1s infinite;
  margin-left:2px;
}

.boot-proceed {
  position:fixed;
  left:50%;
  bottom:34px;
  transform:translateX(-50%);
  display:none;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  letter-spacing:.16em;
  color:var(--green);
  background:transparent;
  border:1px solid var(--green-dim);
  padding:10px 28px;
  cursor:pointer;
  text-transform:uppercase;
}

.boot-proceed.visible {
  display:block;
}

.boot-proceed:hover,
.boot-proceed:focus-visible {
  color:var(--white);
  border-color:var(--green);
  background:rgba(0,255,65,.05);
  outline:none;
}

@media(min-width:900px){
  body {
    zoom:1.65;
  }
}

@media(max-width:640px){
  #boot-inner {
    width:min(92vw, 720px);
  }

  .bl {
    font-size:12px;
    line-height:1.9;
  }

  .boot-proceed {
    bottom:24px;
  }
}
</style>
</head>
<body>

<div class="page active" id="boot">
  <div id="boot-inner"></div>
  <button class="boot-proceed" id="boot-proceed" type="button" onclick="enterArchive()">Proceed</button>
</div>

<script>
const archivePage = 'archive.html';

const lines = [
  {t:'BIOS v2.1.4 ... OK', ms:0},
  {t:'Memory check 65536K ... OK', ms:130},
  {t:'Mounting /archive/tmb/ ...', ms:280},
  {t:'Integrity check ... ', ms:440},
  {t:'WARNING: 6 of 7 dirs locked', ms:620, class:'amb'},
  {t:'', ms:720},
  {t:'This archive was not meant to be public.', ms:900, class:'hi'},
  {t:'We do not know how you found it.', ms:1150, class:'hi'},
  {t:'', ms:1300},
  {t:'DISCLAIMER: This site is a work of fiction created for entertainment purposes.', ms:1500, class:'amb'},
  {t:'Any resemblance to real persons, organizations, events, or systems is coincidental.', ms:1750, class:'amb'},
  {t:'', ms:2000},
  {t:'Proceed anyway? Type "y" and press Enter, or click Proceed.', ms:2250},
  {t:'', ms:2500}
];

let bootReady = false;
let bootTyped = '';
let bootInputLine = null;
let archiveEntered = false;

function runBoot(){
  const c = document.getElementById('boot-inner');

  lines.forEach((l)=>{
    setTimeout(()=>{
      const d = document.createElement('div');
      d.className = 'bl on' + (l.class ? ' ' + l.class : '');
      d.textContent = l.t || '\u00A0';
      c.appendChild(d);
    }, l.ms);
  });

  setTimeout(()=>{
    bootReady = true;

    bootInputLine = document.createElement('div');
    bootInputLine.className = 'bl on boot-input-line';
    bootInputLine.textContent = '>';
    c.appendChild(bootInputLine);

    document.getElementById('boot-proceed').classList.add('visible');
  }, Math.max(...lines.map(l => l.ms)) + 350);
}

function updateBootInput(){
  if (!bootInputLine) return;
  bootInputLine.textContent = '> ' + bootTyped;
}

document.addEventListener('keydown', function(e){
  if (!bootReady) return;

  if (e.key.toLowerCase() === 'y') {
    bootTyped = 'y';
    updateBootInput();
  }

  if (e.key === 'Backspace') {
    bootTyped = '';
    updateBootInput();
  }

  if (e.key === 'Enter' && bootTyped.toLowerCase() === 'y') {
    enterArchive();
  }
});

function enterArchive(){
  if (archiveEntered) return;
  archiveEntered = true;
  window.location.href = archivePage;
}

runBoot();
</script>

</body>
</html>
