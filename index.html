<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE / TMB - Access</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --green:#00ff41;
  --green-mid:#00c032;
  --green-dim:#007a20;
  --green-dark:#002a0a;
  --amber:#ffb000;
  --red:#ff3333;
  --bg:#030803;
  --white:#d0ffd8;
}

*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  min-height:100%;
  background:var(--bg);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
  overflow-y:auto;
}

body::after {
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,255,65,.02) 3px,
    rgba(0,255,65,.02) 4px
  );
  pointer-events:none;
  z-index:9999;
}

@keyframes blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}

.page {
  display:none;
  min-height:100dvh;
  flex-direction:column;
}

.page.active {
  display:flex;
}

#boot {
  align-items:center;
  background:var(--bg);
  padding:48px 0 72px;
}

#boot-inner {
  width:min(720px, 90vw);
}

.bl {
  font-size:13px;
  line-height:2;
  color:var(--green-dim);
  opacity:0;
  transition:opacity .1s;
  white-space:normal;
  overflow-wrap:anywhere;
}

.bl.on {
  opacity:1;
}

.bl.hi {
  color:var(--white);
}

.bl.amb {
  color:var(--amber);
}

.bl.red {
  color:var(--red);
}

.bl.big {
  font-size:18px;
}

.bl.small {
  font-size:11px;
}

.boot-command {
  display:none;
  align-items:center;
  gap:8px;
  width:min(720px, 90vw);
  margin-top:0.75em;
  font-size:13px;
  line-height:2;
  color:var(--white);
}

.boot-command.visible {
  display:flex;
}

.boot-command input {
  flex:1;
  min-width:80px;
  background:transparent;
  border:0;
  outline:0;
  color:var(--white);
  font:inherit;
  caret-color:var(--green);
}

.boot-command::after {
  content:'█';
  animation:blink 1s infinite;
  margin-left:2px;
}

.boot-proceed {
  display:none;
  margin-top:18em;
  margin-bottom:48px;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  letter-spacing:.16em;
  color:var(--green);
  background:transparent;
  border:1px solid var(--green-dim);
  padding:10px 28px;
  cursor:pointer;
  text-transform:uppercase;
  text-decoration:none;
}

.boot-proceed.visible {
  display:inline-block;
}

.boot-proceed:hover,
.boot-proceed:focus-visible {
  color:var(--white);
  border-color:var(--green);
  background:rgba(0,255,65,.05);
  outline:none;
}

@media(max-width:640px){
  #boot {
    align-items:flex-start;
    padding:32px 0 56px;
  }

  #boot-inner {
    width:min(92vw, 720px);
    margin:0 auto;
  }

  .bl {
    font-size:12px;
    line-height:1.9;
  }

  .bl.big {
    font-size:16px;
  }

  .bl.small {
    font-size:10px;
  }

  .boot-command {
    width:min(92vw, 720px);
    margin:0.75em auto 0;
    font-size:12px;
  }

  .boot-proceed {
    margin:12px auto 56px;
  }
}
</style>
</head>

<body>

<div class="page active" id="boot">
  <div id="boot-inner"></div>

  <form class="boot-command" id="boot-command" onsubmit="submitBootCommand(event)">
    <span>&gt;</span>
    <input id="boot-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
  </form>

  <a class="boot-proceed" id="boot-proceed" href="loading.html">Proceed</a>
</div>

<script>
const archivePage = 'archive.html';

const lines = [
  {t:'> wake archive-node /tmb', ms:0},
  {t:'NODE RESPONSE: PARTIAL', ms:130, class:'amb'},
  {t:'Adaptive Intelligence Evolution Protocol', ms:260, class:'hi'},
  {t:'BIOS v2.1.4 ... OK', ms:390},
  {t:'Memory check 65536K ... OK', ms:520},
  {t:'', ms:650},

  {t:'> request /archive/tmb/index.manifest', ms:820},
  {t:'Mounting /archive/tmb/ ...', ms:980},
  {t:'Reading index.manifest ...', ms:1140},
  {t:'Integrity check ... ', ms:1300},
  {t:'WARNING: 6 of 7 dirs locked', ms:1460, class:'amb'},
  {t:'PUBLIC ACCESS FLAG: TRUE', ms:1620, class:'amb'},
  {t:'SOURCE: UNKNOWN', ms:1780, class:'amb'},
  {t:'', ms:1940},

  {t:'> open notice.txt', ms:2160},
  {t:'', ms:2280},
  {t:'This archive was not meant to be public.', ms:2460, class:'hi'},
  {t:'We do not know how you found it.', ms:2710, class:'hi'},
  {t:"We hope you won't share it.", ms:2860, class:'hi'},
  {t:'', ms:3000},

  {t:'DISCLAIMER: This site is a work of fiction created for entertainment purposes.', ms:3260, class:'amb'},
  {t:'Any resemblance to real persons, organizations, events, or systems is coincidental.', ms:3510, class:'amb'},
  {t:'', ms:3860},

  {t:'Proceed? y/n ', ms:4100},
  {t:'Type "y" and press Enter, or click Proceed.', ms:4250, class:'amb small'},
  {t:'', ms:4300}
];

function enterArchive(){
  window.location.href = archivePage;
}

function submitBootCommand(e){
  e.preventDefault();

  const input = document.getElementById('boot-input');

  if (input.value.trim().toLowerCase() === 'y') {
    enterArchive();
  } else {
    input.value = '';
  }
}

function scrollBootToBottom(){
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: 'smooth'
  });
}

function runBoot(){
  const container = document.getElementById('boot-inner');

  lines.forEach((line)=>{
    setTimeout(()=>{
      const div = document.createElement('div');
      div.className = 'bl on' + (line.class ? ' ' + line.class : '');
      div.textContent = line.t || '\u00A0';
      container.appendChild(div);
      scrollBootToBottom();
    }, line.ms);
  });

  setTimeout(()=>{
    document.getElementById('boot-command').classList.add('visible');
    document.getElementById('boot-proceed').classList.add('visible');
    scrollBootToBottom();

    setTimeout(()=>{
      document.getElementById('boot-input').focus({ preventScroll:true });
    }, 100);
  }, Math.max(...lines.map(line => line.ms)) + 350);
}

runBoot();
</script>

</body>
</html>
