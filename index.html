<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVE / TMB - Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --green:#00ff41;
  --green-mid:#00c032;
  --green-dim:#007a20;
  --green-dark:#002a0a;
  --amber:#ffb000;
  --red:#ff3333;
  --bg:#030803;
  --white:#d0ffd8;
}

*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  background:var(--bg);
  color:var(--green);
  font-family:'Share Tech Mono', monospace;
  height:100%;
  overflow:hidden;
}

body::after {
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,255,65,.02) 3px,
    rgba(0,255,65,.02) 4px
  );
  pointer-events:none;
  z-index:9999;
}

@keyframes blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}

.page {
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
}

.page.active {
  display:flex;
}

#boot {
  justify-content:center;
  align-items:center;
  background:var(--bg);
}

#boot-inner {
  width:min(720px, 90vw);
  padding-bottom:96px;
}

.bl {
  font-size:13px;
  line-height:2;
  color:var(--green-dim);
  opacity:0;
  transition:opacity .1s;
  white-space:normal;
}

.bl.on { opacity:1; }
.bl.hi { color:var(--white); }
.bl.amb { color:var(--amber); }
.bl.red { color:var(--red); }

.bl.big {
  font-size:18px;
}

.bl.small {
  font-size:11px;
}

.boot-command {
  display:none;
  align-items:center;
  gap:8px;
  width:min(720px, 90vw);
  font-size:13px;
  line-height:2;
  color:var(--white);
  position:fixed;
  left:50%;
  bottom:88px;
  transform:translateX(-50%);
}

.boot-command.visible {
  display:flex;
}

.boot-command input {
  flex:1;
  min-width:80px;
  background:transparent;
  border:0;
  outline:0;
  color:var(--white);
  font:inherit;
  caret-color:var(--green);
}

.boot-command::after {
  content:'█';
  animation:blink 1s infinite;
  margin-left:2px;
}

.boot-proceed {
  position:fixed;
  left:50%;
  bottom:34px;
  transform:translateX(-50%);
  display:none;
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  letter-spacing:.16em;
  color:var(--green);
  background:transparent;
  border:1px solid var(--green-dim);
  padding:10px 28px;
  cursor:pointer;
  text-transform:uppercase;
  text-decoration:none;
}

.boot-proceed.visible {
  display:block;
}

.boot-proceed:hover,
.boot-proceed:focus-visible {
  color:var(--white);
  border-color:var(--green);
  background:rgba(0,255,65,.05);
  outline:none;
}

@media(min-width:900px){
  body {
    zoom:1.65;
  }
}

@media(max-width:640px){
  #boot-inner {
    width:min(92vw, 720px);
    padding-bottom:130px;
  }

  .bl {
    font-size:12px;
    line-height:1.9;
  }

  .bl.big {
    font-size:16px;
  }

  .bl.small {
    font-size:10px;
  }

  .boot-command {
    width:min(92vw, 720px);
    bottom:82px;
    font-size:12px;
  }

  .boot-proceed {
    bottom:24px;
  }
}
</style>
</head>
<body>

<div class="page active" id="boot">
  <div id="boot-inner"></div>

  <form class="boot-command" id="boot-command" onsubmit="submitBootCommand(event)">
    <span>&gt;</span>
    <input id="boot-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false">
  </form>

  <a class="boot-proceed" id="boot-proceed" href="archive.html">Proceed</a>
</div>

<script>
const archivePage = 'archive.html';

const lines = [
  {t:'> wake archive-node /tmb', ms:0},
  {t:'NODE RESPONSE: PARTIAL', ms:130, class:'amb'},
  {t:'Adaptive Intelligence Evolution Protocol', ms:260, class:'hi'},
  {t:'BIOS v2.1.4 ... OK', ms:390},
  {t:'Memory check 65536K ... OK', ms:520},
  {t:'', ms:650},

  {t:'> request /archive/tmb/index.manifest', ms:820},
  {t:'Mounting /archive/tmb/ ...', ms:980},
  {t:'Reading index.manifest ...', ms:1140},
  {t:'Integrity check ... ', ms:1300},
  {t:'WARNING: 6 of 7 dirs locked', ms:1460, class:'amb'},
  {t:'PUBLIC ACCESS FLAG: TRUE', ms:1620, class:'amb'},
  {t:'SOURCE: UNKNOWN', ms:1780, class:'amb'},
  {t:'', ms:1940},

  {t:'> open notice.txt', ms:2160},
  {t:'', ms:2280},
  {t:'This archive was not meant to be public.', ms:2460, class:'hi'},
  {t:'We do not know how you found it.', ms:2710, class:'hi'},
  {t:"We hope you won't share it.", ms:2860, class:'hi'},
  {t:'', ms:3000},

  {t:'DISCLAIMER: This site is a work of fiction created for entertainment purposes.', ms:3260, class:'amb'},
  {t:'Any resemblance to real persons, organizations, events, or systems is coincidental.', ms:3510, class:'amb'},
  {t:'', ms:3860},

  {t:'Proceed? y/n ', ms:4100},
  {t:'Type "y" and press Enter, or click Proceed.', ms:4250, class:'amb small'},
  {t:'', ms:4300}
];
function enterArchive(){
  window.location.href = archivePage;
}

function submitBootCommand(e){
  e.preventDefault();

  const input = document.getElementById('boot-input');

  if (input.value.trim().toLowerCase() === 'y') {
    enterArchive();
  } else {
    input.value = '';
  }
}

function runBoot(){
  const c = document.getElementById('boot-inner');

  lines.forEach((l)=>{
    setTimeout(()=>{
      const d = document.createElement('div');
      d.className = 'bl on' + (l.class ? ' ' + l.class : '');
      d.textContent = l.t || '\u00A0';
      c.appendChild(d);
    }, l.ms);
  });

  setTimeout(()=>{
    document.getElementById('boot-command').classList.add('visible');
    document.getElementById('boot-proceed').classList.add('visible');

    setTimeout(()=>{
      document.getElementById('boot-input').focus();
    }, 100);
  }, Math.max(...lines.map(l => l.ms)) + 350);
}

runBoot();
</script>

</body>
</html>
